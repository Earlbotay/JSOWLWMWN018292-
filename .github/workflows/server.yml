name: Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            8
            11
            17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install common SDK packages
        run: |
          sdkmanager "platforms;android-34" "platforms;android-33" \
                     "platforms;android-31" "platforms;android-30" \
                     "build-tools;34.0.0" "build-tools;33.0.2" \
                     "build-tools;30.0.3" 2>/dev/null || true

      - name: Install apktool
        run: |
          APKTOOL_VERSION="2.9.3"
          sudo wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VERSION}/apktool_${APKTOOL_VERSION}.jar" -O /usr/local/bin/apktool.jar
          sudo wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" -O /usr/local/bin/apktool
          sudo chmod +x /usr/local/bin/apktool
          apktool --version

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          cloudflared --version

      - name: Check Local API availability
        id: check-local-api
        env:
          API_ID: ${{ secrets.API_ID }}
        run: |
          if [ -n "$API_ID" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Restore Telegram Bot API Server
        id: cache-tg-api
        if: steps.check-local-api.outputs.available == 'true'
        uses: actions/cache/restore@v4
        with:
          path: /usr/local/bin/telegram-bot-api
          key: tg-bot-api-v1

      - name: Build Telegram Bot API Server
        if: steps.check-local-api.outputs.available == 'true' && steps.cache-tg-api.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq make git zlib1g-dev libssl-dev gperf cmake g++
          git clone --recursive https://github.com/tdlib/telegram-bot-api.git /tmp/tg-bot-api
          cd /tmp/tg-bot-api
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX:PATH=/usr/local ..
          cmake --build . --target install -j$(nproc)

      - name: Save Telegram Bot API Server
        if: steps.check-local-api.outputs.available == 'true' && steps.cache-tg-api.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /usr/local/bin/telegram-bot-api
          key: tg-bot-api-v1

      - name: Restore Telegram Bot API Data
        id: cache-tg-data
        if: steps.check-local-api.outputs.available == 'true'
        uses: actions/cache/restore@v4
        with:
          path: /home/runner/tg-api-data
          key: tg-api-data-${{ github.run_id }}
          restore-keys: |
            tg-api-data-

      - name: Start Telegram Bot API Server
        if: steps.check-local-api.outputs.available == 'true'
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
        run: |
          mkdir -p /home/runner/tg-api-data
          telegram-bot-api --api-id=$API_ID --api-hash=$API_HASH --local --dir=/home/runner/tg-api-data &
          sleep 3
          echo "Telegram Bot API Local Server started on port 8081"

      - name: Install Python deps
        run: pip install -r server/requirements.txt

      - name: Run bot server
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          OWNER_TG_ID: ${{ secrets.OWNER_TG_ID }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          CHANNEL_LINK: ${{ secrets.CHANNEL_LINK }}
          PRIVATE_REPO: ${{ secrets.PRIVATE_REPO }}
          VIDEO_URL: ${{ secrets.VIDEO_URL }}
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
        run: python server/main.py

      - name: Save Telegram Bot API Data
        if: always() && steps.check-local-api.outputs.available == 'true'
        uses: actions/cache/save@v4
        with:
          path: /home/runner/tg-api-data
          key: tg-api-data-${{ github.run_id }}
